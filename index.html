<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometria Milliomos</title>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background: radial-gradient(circle, #0a0a2a 0%, #000000 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-wrapper {
            width: 95%;
            max-width: 900px;
            text-align: center;
        }
        h1 {
            color: #e5a93c;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(229, 169, 60, 0.5);
        }
        
        #main-layout {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }
        
        #quiz-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        #ladder-area {
            flex: 1;
            background-color: #03033d;
            border: 2px solid #e5a93c;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column-reverse;
            box-shadow: 0 0 15px rgba(229, 169, 60, 0.2);
            min-width: 200px;
        }
        
        .ladder-step {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            color: #e5a93c;
            font-weight: bold;
            text-align: right;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .ladder-step.active {
            background-color: #e5a93c;
            color: #000;
            box-shadow: 0 0 10px #e5a93c;
        }
        .ladder-step.won {
            color: #00ff66;
        }

        #question {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #03033d;
            border: 2px solid #e5a93c;
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(229, 169, 60, 0.3);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            background-color: #000000;
            color: #e5a93c;
            border: 2px solid #e5a93c;
            padding: 15px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .btn:hover:not(:disabled) {
            background-color: #e5a93c;
            color: #000000;
            box-shadow: 0 0 15px #e5a93c;
        }
        .btn:disabled {
            cursor: default;
        }

        /* Gomb állapotok (Kiválasztott, Helyes, Helytelen) */
        .btn.selected {
            background-color: #e5a93c !important;
            color: #000 !important;
        }
        .btn.correct {
            background-color: #00ff66 !important;
            border-color: #00ff66 !important;
            color: #000 !important;
            box-shadow: 0 0 20px #00ff66 !important;
        }
        .btn.wrong {
            background-color: #ff4444 !important;
            border-color: #ff4444 !important;
            color: #fff !important;
            box-shadow: 0 0 20px #ff4444 !important;
        }
        
        #result-area {
            background-color: #03033d;
            border: 2px solid #e5a93c;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            #main-layout {
                flex-direction: column;
                align-items: center;
            }
            #ladder-area {
                flex-direction: row-reverse;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
                margin-bottom: 20px;
            }
            .ladder-step {
                margin: 2px;
                padding: 5px 10px;
                font-size: 0.9rem;
            }
            #options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <h1>Legyen Ön is Geometria Milliomos!</h1>
    
    <div id="main-layout">
        <div id="quiz-area">
            <div id="question">Kérdés betöltése...</div>
            <div id="options"></div>
        </div>
        
        <div id="ladder-area"></div>
    </div>
    
    <div id="result-area" class="hidden">
        <h2 id="final-message">Vége a játéknak!</h2>
        <p>Elvitt nyeremény: <br><span id="final-score" style="color: #00ff66; font-weight: bold; font-size: 2rem;">0 Ft</span></p>
        <button class="btn" style="margin-top: 20px; width: 100%;" onclick="startGame()">Új játék indítása</button>
    </div>
</div>

<script>
    const questions = [
      {
        q: "A háromszög azon pontja, amely a szakaszokat a csúcstól számítva 2:1 arányban osztja fel.",
        options: ["Magasságpont", "Beírt kör középpontja", "Súlypont", "Körülírt kör középpontja"],
        answer: "Súlypont"
      },
      {
        q: "Merőleges a háromszög adott oldalára, és átmegy annak felezőpontján. Nem feltétlenül megy át a szemközti csúcson.",
        options: ["Magasságvonal", "Oldalfelező merőleges", "Súlyvonal", "Belső szögfelező"],
        answer: "Oldalfelező merőleges"
      },
      {
        q: "Az a szakasz, amely a háromszög csúcsát a szemközti oldal felezőpontjával köti össze.",
        options: ["Magasságvonal", "Szögfelező", "Oldalfelező merőleges", "Súlyvonal"],
        answer: "Súlyvonal"
      },
      {
        q: "Az oldalfelező merőlegesek metszéspontja adja meg ezt a nevezetes pontot.",
        options: ["Beírt kör középpontja", "Súlypont", "Körülírt kör középpontja", "Magasságpont"],
        answer: "Körülírt kör középpontja"
      },
      {
        q: "A csúcsból a szemközti oldal egyenesére bocsátott merőleges szakasz.",
        options: ["Súlyvonal", "Magasság", "Szögfelező", "Oldalfelező merőleges"],
        answer: "Magasság"
      },
      {
        q: "Azon pontok halmaza, amelyek egyenlő távolságra vannak a szög két szárától.",
        options: ["Középvonal", "Belső szögfelező", "Magasságvonal", "Súlyvonal"],
        answer: "Belső szögfelező"
      },
      {
        q: "A háromszög azon pontja, amely a háromszög mindhárom oldalegyenesétől azonos távolságra fekszik.",
        options: ["Súlypont", "Beírt kör középpontja", "Magasságpont", "Körülírt kör középpontja"],
        answer: "Beírt kör középpontja"
      }
    ];

    const prizeValues = [10000, 50000, 100000, 250000, 500000, 1000000, 5000000];
    
    let currentQuestionIndex = 0;
    let currentPrize = 0;
    let score = 0;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const ladderAreaEl = document.getElementById('ladder-area');
    const mainLayoutEl = document.getElementById('main-layout');
    const resultAreaEl = document.getElementById('result-area');
    const finalScoreEl = document.getElementById('final-score');
    const finalMessageEl = document.getElementById('final-message');

    function buildLadder() {
        ladderAreaEl.innerHTML = '';
        prizeValues.forEach((amount, index) => {
            const step = document.createElement('div');
            step.classList.add('ladder-step');
            step.id = `step-${index}`;
            step.innerText = `${index + 1}. ${amount.toLocaleString('hu-HU')} Ft`;
            ladderAreaEl.appendChild(step);
        });
    }

    function updateLadder() {
        prizeValues.forEach((_, index) => {
            const step = document.getElementById(`step-${index}`);
            step.classList.remove('active', 'won');
            
            if (index < currentQuestionIndex) {
                step.classList.add('won');
            } else if (index === currentQuestionIndex) {
                step.classList.add('active');
            }
        });
    }

    function startGame() {
        currentQuestionIndex = 0;
        currentPrize = 0;
        score = 0;
        
        mainLayoutEl.classList.remove('hidden');
        resultAreaEl.classList.add('hidden');
        
        buildLadder();
        loadQuestion();
    }

    function loadQuestion() {
        updateLadder();
        optionsEl.innerHTML = '';
        const currentQ = questions[currentQuestionIndex];
        questionEl.innerText = currentQ.q;

        const labels = ['A:', 'B:', 'C:', 'D:'];

        currentQ.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerHTML = `<span style="color: white; margin-right: 10px;">${labels[index]}</span> <span class="option-text">${option}</span>`;
            button.classList.add('btn');
            
            // Az eseménykezelőnek átadjuk magát a gombot is
            button.onclick = (e) => checkAnswer(option, button);
            optionsEl.appendChild(button);
        });
    }

    function checkAnswer(selectedOption, clickedButton) {
        const currentQ = questions[currentQuestionIndex];
        const allButtons = document.querySelectorAll('#options .btn');
        
        // 1. Minden gombot letiltunk, hogy ne lehessen többet kattintani
        allButtons.forEach(btn => btn.disabled = true);
        
        // 2. Megjelöljük sárgával a kiválasztott választ
        clickedButton.classList.add('selected');

        // 3. Várunk 1.5 másodpercet a "dráma" kedvéért
        setTimeout(() => {
            // Levesszük a sárga jelölést
            clickedButton.classList.remove('selected');

            if (selectedOption === currentQ.answer) {
                // HELYES VÁLASZ -> Zöldre vált
                clickedButton.classList.add('correct');
                currentPrize = prizeValues[currentQuestionIndex];
                currentQuestionIndex++;

                // Várunk még 1.5 másodpercet, mielőtt betölt a következő kérdés
                setTimeout(() => {
                    if (currentQuestionIndex < questions.length) {
                        loadQuestion();
                    } else {
                        showResult(true); 
                    }
                }, 1500);

            } else {
                // HELYTELEN VÁLASZ -> Pirosra vált
                clickedButton.classList.add('wrong');
                
                // Keressük meg és zöldítsük ki a helyes választ is
                allButtons.forEach(btn => {
                    if (btn.querySelector('.option-text').innerText === currentQ.answer) {
                        btn.classList.add('correct');
                    }
                });

                // Várunk picit, hogy a játékos lássa, mit rontott el, aztán vége
                setTimeout(() => {
                    showResult(false);
                }, 2000);
            }
        }, 1500); // Ez itt az 1.5 másodperces várakozás a megjelölés után
    }

    function showResult(isWin) {
        mainLayoutEl.classList.add('hidden');
        resultAreaEl.classList.remove('hidden');
        
        if (isWin) {
            finalMessageEl.innerText = "Zseniális! Megnyerted a fődíjat!";
            finalMessageEl.style.color = "#e5a93c";
        } else {
            finalMessageEl.innerText = "Sajnos rossz válasz. A játéknak vége!";
            finalMessageEl.style.color = "#ff4444";
        }
        
        finalScoreEl.innerText = currentPrize.toLocaleString('hu-HU') + " Ft";
    }

    startGame();
</script>

</body>
</html>
